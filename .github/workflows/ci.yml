name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --exclude forgellm-python
      - name: Test
        run: cargo test --workspace --exclude forgellm-python
      - name: Clippy
        run: cargo clippy --workspace --exclude forgellm-python -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  metal-smoke:
    name: Metal Smoke Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p forgellm-cli
      - name: Generate Metal project
        run: |
          # Download a tiny test model or use a synthetic one
          # For now, just verify the codegen tests pass
          cargo test -p forgellm-codegen-metal
