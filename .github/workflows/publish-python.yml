name: Publish Python Wheels

# Trigger on version tags (e.g. v0.4.1) or manual dispatch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64: use manylinux for broad compatibility
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # macOS Intel
          - os: macos-13
            target: x86_64
            manylinux: ''
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64
            manylinux: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/forgellm-python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --strip

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/forgellm-python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    # Only publish when triggered by a tag push, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/forgellm
    permissions:
      id-token: write  # for OIDC-based trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
